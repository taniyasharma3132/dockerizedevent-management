version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: event_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build: ./backend
    container_name: event_backend
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/eventsdb
      - JWT_SECRET=supersecret
    depends_on:
      - mongodb

  frontend:
    build: ./frontend
    container_name: event_frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mongo_data:
